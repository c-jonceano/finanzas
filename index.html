<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Hina - 10° Ciclo</title>
    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        select, input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #005a9e; }
        #loader { text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💸 Registro de Gastos</h2>
        <div id="loader">Cargando categorías desde Excel...</div>
        
        <form id="gastoForm" style="display: none;">
            <label>¿En qué gastaste?</label>
            <select id="subcategoria" required></select>

            <label>Monto (S/)</label>
            <input type="number" id="monto" step="0.10" required placeholder="Ej: 15.50">

            <label>Nota adicional</label>
            <input type="text" id="nota" placeholder="Ej: Pasajes Huaraz-Caraz">

            <button type="submit" id="btnGuardar">Guardar en mi Presupuesto</button>
        </form>
    </div>

    <script>
        const API_URL = 'https://finanzas-api.azurewebsites.net/api/registrar';

        // 1. Cargar categorías dinámicamente al iniciar
        window.onload = async () => {
            try {
                const response = await fetch(API_URL);
                const categorias = await response.json();
                const select = document.getElementById('subcategoria');
                
                categorias.forEach(cat => {
                    let opt = document.createElement('option');
                    opt.value = cat;
                    opt.innerHTML = cat;
                    select.appendChild(opt);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('gastoForm').style.display = 'block';
            } catch (err) {
                document.getElementById('loader').innerHTML = "❌ Error al conectar con Azure";
            }
        };

        // 2. Enviar el gasto
        document.getElementById('gastoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.innerHTML = "Guardando...";
            btn.disabled = true;

            const data = {
                subcategoria: document.getElementById('subcategoria').value,
                monto: parseFloat(document.getElementById('monto').value),
                nota: document.getElementById('nota').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('✅ ¡Registrado con éxito!');
                    e.target.reset();
                } else {
                    alert('❌ Error al guardar');
                }
            } catch (err) {
                alert('❌ No se pudo conectar con el servidor');
            } finally {
                btn.innerHTML = "Guardar en mi Presupuesto";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
